<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Organizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <div class="titlebar">
      <div class="titlebar-drag">
        <div class="app-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor" opacity="0.9"/>
            <rect x="13" y="3" width="8" height="8" rx="2" fill="currentColor" opacity="0.5"/>
            <rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor" opacity="0.5"/>
            <rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor" opacity="0.2"/>
          </svg>
        </div>
        <span class="app-title">Study Organizer</span>
      </div>
      <div class="titlebar-controls">
        <button class="tb-btn" id="btn-minimize" title="Minimizar">
          <svg width="10" height="2" viewBox="0 0 10 2"><rect width="10" height="2" rx="1" fill="currentColor"/></svg>
        </button>
        <button class="tb-btn" id="btn-maximize" title="Maximizar">
          <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        </button>
        <button class="tb-btn tb-btn--close" id="btn-close" title="Fechar">
          <svg width="10" height="10" viewBox="0 0 10 10"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="layout">
      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="nav-items">
          <button class="nav-item active" data-page="planning">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Planejamento</span>
          </button>
          <button class="nav-item" data-page="timer">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <circle cx="12" cy="13" r="8"/>
              <polyline points="12 9 12 13 15 14"/>
              <line x1="9" y1="2" x2="15" y2="2"/>
            </svg>
            <span>Cronômetro</span>
          </button>
          <button class="nav-item" data-page="subjects">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            <span>Matérias</span>
          </button>
          <button class="nav-item" data-page="dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/>
              <line x1="2" y1="20" x2="22" y2="20"/>
            </svg>
            <span>Relatórios</span>
          </button>
        </div>

        <div class="sidebar-footer">
          <div class="today-badge" id="today-badge">
            <div class="today-dot"></div>
            <span id="today-label">Carregando...</span>
          </div>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="content" id="main-content">
        <!-- Pages injected by JS -->
      </main>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button class="modal-close" id="modal-close">
          <svg width="14" height="14" viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
